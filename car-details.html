<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Details - Car Zone</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }
    header {
      background-color: #ca1111;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      background-color: #2c2c2c;
      padding: 0.3rem;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1rem;
    }
    nav a:hover {
      color: #ff4444;
    }
    .container {
      width: 90%;
      max-width: 800px;
      margin: 5rem auto 2rem;
      padding: 1rem;
      background-color: #fff;
      border: 1px solid #ccc;
    }
    .car-details img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      margin-bottom: 1rem;
    }
    .car-details h2 {
      margin-bottom: 1rem;
      color: #333;
    }
    .car-details p {
      color: #666;
      margin: 0.5rem 0;
    }
    .back-button {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background-color: #ca1111;
      color: white;
      text-decoration: none;
    }
    .back-button:hover {
      background-color: #a50d0d;
    }
    footer {
      background-color: #2c2c2c;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.5rem;
      }
      .car-details img {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Car Zone</h1>
    <p>Unleash the Luxury You Deserve</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="index.html">Cars</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <div class="car-details" id="carDetails">
      <p>Loading car details...</p>
    </div>
    <a href="index.html" class="back-button">Back to Cars</a>
  </div>

  <footer>
    <p>© 2025 Car Zone. All rights reserved.</p>
  </footer>

  <script>
    const cars = [
      { id: 1, brand: "Toyota", model: "Corolla", year: 2020, price: 18000, image: "picss/ToyotaCorolla.jpg", description: "Excellent condition with low mileage. Perfect for daily commuting with great fuel efficiency.", mileage: "25,000 miles", transmission: "Automatic" },
      { id: 2, brand: "Honda", model: "Civic", year: 2019, price: 16500, image: "picss/HondaCivic.jpg", description: "Fuel efficient and reliable. Well-maintained with recent service history.", mileage: "30,000 miles", transmission: "CVT" },
      { id: 3, brand: "Ford", model: "Mustang", year: 2021, price: 32000, image: "picss/FordMustang.jpg", description: "Powerful V8 engine, like new. Perfect for car enthusiasts.", mileage: "15,000 miles", transmission: "Manual" },
      { id: 4, brand: "Toyota", model: "Camry", year: 2018, price: 15500, image: "picss/ToyotaCamry.jpg", description: "Comfortable family sedan with spacious interior and modern features.", mileage: "40,000 miles", transmission: "Automatic" },
      { id: 5, brand: "Ford", model: "F-150 Raptor", year: 2022, price: 78572, image: "picss/FordRaptor.jpg", description: "Advanced off-road capabilities with FOX shocks, 37-inch tires, and 12-inch touchscreen.", mileage: "20,000 miles", transmission: "Automatic" },
      { id: 6, brand: "Toyota", model: "Crown", year: 2020, price: 26786, image: "picss/Crown.jpg", description: "Luxurious interior with advanced safety features and a comfortable ride.", mileage: "35,000 miles", transmission: "Hybrid Automatic" },
      { id: 7, brand: "McLaren", model: "P1", year: 2015, price: 1100000, image: "picss/McLarenP1.jpg", description: "Hybrid hypercar with advanced aerodynamics, 3.8L Twin-Turbo V8, 0-100 km/h in 2.8 seconds.", mileage: "5,000 miles", transmission: "Automatic" }
    ];

    function displayCarDetails() {
      const params = new URLSearchParams(window.location.search);
      const carId = Number(params.get("id"));
      const car = cars.find(c => c.id === carId);
      const carDetails = document.getElementById("carDetails");

      if (car) {
        carDetails.innerHTML = `
          <img src="${car.image}" alt="${car.brand} ${car.model}" onerror="this.src='https://via.placeholder.com/300x200?text=${car.brand}+${car.model}'">
          <h2>${car.brand} ${car.model} (${car.year})</h2>
          <p><strong>Price:</strong> $${car.price.toLocaleString()}</p>
          <p><strong>Mileage:</strong> ${car.mileage}</p>
          <p><strong>Transmission:</strong> ${car.transmission}</p>
          <p>${car.description}</p>
        `;
      } else {
        carDetails.innerHTML = "<p>Car not found.</p>";
      }
    }
    document.addEventListener("DOMContentLoaded", displayCarDetails);
  </script>
</body>
</html>
